<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gtHEIGHTS | Our Agents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased selection:bg-purple-500/20 selection:text-purple-300">
    <header id="site-header"></header>

    <main class="pt-28 md:pt-32 pb-16 max-w-7xl mx-auto px-4 sm:px-6 w-full flex flex-col justify-center space-y-16">
        <div class="view-frame text-center mb-8">
            <h1 class="serif-heading text-4xl sm:text-5xl font-medium text-white mb-4">Meet Our Local Agents</h1>
            <p class="text-zinc-400 text-sm">Dedicated professionals finding you the perfect home in Polokwane.</p>
        </div>

        <div class="view-frame grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 justify-center">
            <!-- Agent 1 -->
            <div class="bg-[#0c0c0e] rounded-2xl overflow-hidden border border-white/5 hover:border-purple-500/30 transition-all duration-500 max-w-sm mx-auto w-full">
                <div class="aspect-square bg-zinc-900 overflow-hidden">
                    <img src="https://avatars.githubusercontent.com/u/157944600?v=4" class="w-full h-full object-cover opacity-80 hover:opacity-100 transition-opacity duration-500" alt="Agent">
                </div>
                <div class="p-8 text-center">
                    <h3 class="serif-heading text-2xl font-medium text-white mb-1">Hardy HASTINGS</h3>
                    <p class="text-xs text-purple-400 uppercase tracking-widest mb-4">Lead Estate Agent</p>
                    <p class="text-zinc-400 text-sm mb-6">Expert in Polokwane central rentals and long-term lease structures.</p>
                    <a href="contact.html" class="text-xs font-semibold uppercase border border-white/20 px-6 py-3 rounded-full hover:bg-white hover:text-black transition-colors block">Contact Thabo</a>
                </div>
            </div>

        </div>
    </main>

    <footer id="site-footer"></footer>
    <script src="components.js"></script>
</body>
</html>
