<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gtHEIGHTS | Book a Stay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body class="antialiased selection:bg-purple-500/20 selection:text-purple-300">
    <header id="site-header"></header>

    <main class="pt-28 md:pt-32 pb-16 max-w-7xl mx-auto px-4 sm:px-6 w-full flex flex-col justify-center" id="book-container">
        <!-- Dynamically injected -->
    </main>

    <footer id="site-footer"></footer>
    <script src="components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            const rooms = estateDatabase;
            const selectedRoom = rooms.find(p => p.id === id);
            const availableRooms = rooms.filter(room => room.available !== false);
            const initialRoom = (selectedRoom && selectedRoom.available !== false ? selectedRoom : null) || availableRooms[0] || rooms[0];
            const container = document.getElementById('book-container');
            const now = new Date();
            const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

            container.innerHTML = `
                <div class="view-frame max-w-6xl mx-auto w-full mt-4 space-y-8">
                    <div class="text-center max-w-2xl mx-auto">
                        <span class="text-xs tracking-[0.3em] text-purple-500 font-semibold uppercase block mb-4">Guesthouse Booking</span>
                        <h1 class="serif-heading text-3xl sm:text-4xl md:text-5xl font-medium text-white leading-tight mb-4">Book a Stay by the Day</h1>
                        <p class="text-zinc-400 text-sm leading-relaxed">Choose one of our rooms, select how many days you'd like to stay, and we’ll calculate the total automatically.</p>
                    </div>

                    <div class="grid grid-cols-1 xl:grid-cols-5 gap-8 items-start">
                        <div class="xl:col-span-3 bg-[#0c0c0e] border border-white/5 rounded-2xl p-6 md:p-8 space-y-6">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                <div>
                                    <p class="text-xs tracking-widest uppercase text-zinc-500">Available Rooms</p>
                                    <p class="text-sm text-zinc-400">Toggle the list below to see the rooms you can book right now.</p>
                                </div>
                                <button type="button" id="toggle-rooms" class="text-xs tracking-widest uppercase font-semibold border border-white/10 px-5 py-3 rounded-full hover:bg-white hover:text-black transition-colors">
                                    Show Available Rooms
                                </button>
                            </div>

                            <div id="available-rooms-panel" class="hidden space-y-4">
                                ${availableRooms.length ? `
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        ${availableRooms.map(room => `
                                            <button type="button" onclick="selectGuesthouseRoom(${room.id})" class="text-left group bg-zinc-950/80 border border-white/5 rounded-2xl overflow-hidden hover:border-purple-500/30 transition-colors">
                                                <div class="aspect-[16/10] bg-zinc-900 relative overflow-hidden">
                                                    <img src="${room.img}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700 ease-out">
                                                    <div class="absolute top-4 left-4 text-[10px] tracking-widest uppercase font-semibold px-3 py-1 rounded-full border border-emerald-400/40 text-emerald-300 bg-emerald-500/10">Available</div>
                                                </div>
                                                <div class="p-5 space-y-4">
                                                    <div class="flex items-start justify-between gap-4">
                                                        <div>
                                                            <p class="text-[10px] tracking-widest uppercase text-purple-400 font-semibold">${room.tier}</p>
                                                            <h3 class="serif-heading text-2xl text-white mt-1">${room.name}</h3>
                                                        </div>
                                                        <span class="text-xs text-zinc-400 bg-white/5 border border-white/5 px-3 py-1 rounded-full">ZAR ${room.pricePerDay.toLocaleString()} / day</span>
                                                    </div>
                                                    <p class="text-sm text-zinc-400">${room.spec}</p>
                                                </div>
                                            </button>
                                        `).join('')}
                                    </div>
                                ` : `
                                    <div class="rounded-2xl border border-white/5 bg-zinc-950/80 p-6 text-sm text-zinc-400">There are no rooms marked available right now.</div>
                                `}
                            </div>

                            <form id="booking-form" class="space-y-6 border-t border-white/5 pt-6">
                                <input type="hidden" name="room" id="room-field" value="${initialRoom ? initialRoom.name : ''}">
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-2">Select Room</label>
                                        <select id="room-select" name="roomId" class="w-full bg-zinc-950 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-purple-500">
                                            ${rooms.map(room => `<option value="${room.id}" ${initialRoom && initialRoom.id === room.id ? 'selected' : ''} ${room.available === false ? 'disabled' : ''}>${room.name} - ZAR ${room.pricePerDay.toLocaleString()} / day${room.available === false ? ' (Booked)' : ''}</option>`).join('')}
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-2">Number of Days</label>
                                        <input id="stay-days" name="days" type="number" min="1" value="1" required class="w-full bg-zinc-950 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-purple-500">
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-2">Your Full Name</label>
                                        <input name="name" type="text" required class="w-full bg-zinc-950 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-purple-500">
                                    </div>
                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-2">Contact Number</label>
                                        <input name="phone" type="tel" required class="w-full bg-zinc-950 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-purple-500">
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-2">Email Address</label>
                                        <input name="email" type="email" required class="w-full bg-zinc-950 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-purple-500">
                                    </div>
                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-2">Check-in Date</label>
                                        <input name="date" type="date" min="${today}" value="${today}" required class="w-full bg-zinc-950 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-purple-500">
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-2">Special Requests</label>
                                    <textarea name="notes" rows="4" class="w-full bg-zinc-950 border border-white/10 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-purple-500" placeholder="Tell us anything we should know about your stay."></textarea>
                                </div>

                                <button type="submit" id="booking-trigger" class="w-full bg-purple-600 text-white text-xs tracking-widest uppercase font-semibold py-4 rounded-xl hover:bg-purple-500 transition-colors shadow-[0_4px_20px_rgba(147,51,234,0.25)]">
                                    Confirm Booking Request
                                </button>
                            </form>
                        </div>

                        <aside class="xl:col-span-2 space-y-4">
                            <div class="bg-[#0c0c0e] border border-white/5 rounded-2xl p-6">
                                <p class="text-[10px] tracking-widest uppercase text-zinc-500">Selected Room</p>
                                <h2 id="selected-room-name" class="serif-heading text-3xl text-white mt-2">${initialRoom ? initialRoom.name : 'No room selected'}</h2>
                                <p id="selected-room-copy" class="text-sm text-zinc-400 mt-3 leading-relaxed">${initialRoom ? initialRoom.spec : 'Choose a room to view the rate and total stay cost.'}</p>

                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6 text-sm">
                                    <div class="rounded-xl border border-white/5 bg-zinc-950/70 p-4">
                                        <p class="text-[10px] uppercase tracking-widest text-zinc-500 mb-2">Price per day</p>
                                        <p id="selected-room-rate" class="text-xl font-semibold text-white">${initialRoom ? `ZAR ${initialRoom.pricePerDay.toLocaleString()}` : 'ZAR 0'}</p>
                                    </div>
                                    <div class="rounded-xl border border-white/5 bg-zinc-950/70 p-4">
                                        <p class="text-[10px] uppercase tracking-widest text-zinc-500 mb-2">Stay total</p>
                                        <p id="selected-stay-total" class="text-xl font-semibold text-white">ZAR ${initialRoom ? initialRoom.pricePerDay.toLocaleString() : '0'}</p>
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-4 text-center text-xs tracking-wider uppercase text-zinc-400 border-t border-white/5 pt-4">
                                    <div><p class="text-zinc-600 mb-1">Bedrooms</p><p class="font-semibold text-white">${initialRoom ? initialRoom.beds : '-'}</p></div>
                                    <div><p class="text-zinc-600 mb-1">Bathrooms</p><p class="font-semibold text-white">${initialRoom ? initialRoom.baths : '-'}</p></div>
                                    <div><p class="text-zinc-600 mb-1">Area</p><p class="font-semibold text-white">${initialRoom ? `${initialRoom.area} m²` : '-'}</p></div>
                                </div>
                            </div>

                            <div class="bg-purple-600/10 border border-purple-500/20 rounded-2xl p-6">
                                <p class="text-xs tracking-widest uppercase text-purple-300 font-semibold mb-2">Booking Note</p>
                                <p class="text-sm text-zinc-300 leading-relaxed">Availability is shown on this page before you submit. If you need help, use the contact page and our team can confirm the latest room status for your stay.</p>
                            </div>
                        </aside>
                    </div>
                </div>
            `;

            const roomSelect = document.getElementById('room-select');
            const roomField = document.getElementById('room-field');
            const daysInput = document.getElementById('stay-days');
            const toggleRoomsButton = document.getElementById('toggle-rooms');
            const availableRoomsPanel = document.getElementById('available-rooms-panel');
            const selectedRoomName = document.getElementById('selected-room-name');
            const selectedRoomCopy = document.getElementById('selected-room-copy');
            const selectedRoomRate = document.getElementById('selected-room-rate');
            const selectedStayTotal = document.getElementById('selected-stay-total');

            function getSelectedRoom() {
                return rooms.find(room => String(room.id) === String(roomSelect.value)) || initialRoom || rooms[0];
            }

            function refreshBookingSummary() {
                const room = getSelectedRoom();
                const stayDays = Math.max(1, parseInt(daysInput.value, 10) || 1);
                const total = room ? room.pricePerDay * stayDays : 0;

                if (roomField) {
                    roomField.value = room ? room.name : '';
                }

                if (selectedRoomName) {
                    selectedRoomName.textContent = room ? room.name : 'No room selected';
                }

                if (selectedRoomCopy) {
                    selectedRoomCopy.textContent = room ? room.spec : 'Choose a room to view the rate and total stay cost.';
                }

                if (selectedRoomRate) {
                    selectedRoomRate.textContent = room ? `ZAR ${room.pricePerDay.toLocaleString()}` : 'ZAR 0';
                }

                if (selectedStayTotal) {
                    selectedStayTotal.textContent = `ZAR ${total.toLocaleString()}`;
                }
            }

            window.selectGuesthouseRoom = (roomId) => {
                roomSelect.value = String(roomId);
                availableRoomsPanel.classList.add('hidden');
                toggleRoomsButton.textContent = 'Show Available Rooms';
                refreshBookingSummary();
                document.getElementById('booking-form').scrollIntoView({ behavior: 'smooth', block: 'start' });
            };

            toggleRoomsButton.addEventListener('click', () => {
                const willShow = availableRoomsPanel.classList.contains('hidden');
                availableRoomsPanel.classList.toggle('hidden');
                toggleRoomsButton.textContent = willShow ? 'Hide Available Rooms' : 'Show Available Rooms';
            });

            roomSelect.addEventListener('change', refreshBookingSummary);
            daysInput.addEventListener('input', refreshBookingSummary);
            refreshBookingSummary();

            document.getElementById('booking-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const payload = {
                    Room: fd.get('room'),
                    RoomId: fd.get('roomId'),
                    Days: fd.get('days'),
                    CheckInDate: fd.get('date'),
                    Name: fd.get('name'),
                    Phone: fd.get('phone'),
                    Email: fd.get('email'),
                    SpecialRequests: fd.get('notes'),
                    PricePerDay: `ZAR ${getSelectedRoom().pricePerDay.toLocaleString()}`,
                    TotalStayPrice: `ZAR ${(getSelectedRoom().pricePerDay * Math.max(1, parseInt(fd.get('days'), 10) || 1)).toLocaleString()}`
                };
                submitFormToDiscord('Guesthouse Booking Request', payload, 'booking-trigger');
            });
        });
    </script>
</body>

</html>
