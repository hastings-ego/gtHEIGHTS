<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gtHEIGHTS | Guesthouse Rooms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body class="antialiased selection:bg-purple-500/20 selection:text-purple-300">

    <header id="site-header"></header>

    <main class="pt-28 md:pt-32 pb-16 max-w-7xl mx-auto px-4 sm:px-6 w-full flex flex-col justify-center">
        <div class="view-frame" id="rooms-container">
            <!-- Dynamically populated from script.js database -->
        </div>
    </main>

    <footer id="site-footer"></footer>

    <script src="components.js"></script>  
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('rooms-container');
            const elements = estateDatabase.map(item => `
                <a href="room.html?id=${item.id}" class="group block bg-[#0c0c0e] rounded-2xl overflow-hidden border border-white/5 hover:border-purple-500/30 transition-all duration-500">
                    <div class="aspect-[16/10] relative overflow-hidden bg-zinc-900">
                        <img src="${item.img}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700 ease-out">
                        <div class="absolute top-4 left-4 text-[10px] tracking-widest uppercase font-semibold px-3 py-1 rounded-full border ${item.available ? 'border-emerald-400/40 text-emerald-300 bg-emerald-500/10' : 'border-rose-400/40 text-rose-300 bg-rose-500/10'}">
                            ${item.available ? 'Available' : 'Booked'}
                        </div>
                    </div>
                    <div class="p-8">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] tracking-widest font-semibold text-purple-400 uppercase">${item.tier}</span>
                                <h3 class="serif-heading text-2xl font-medium text-white mt-1">${item.name}</h3>
                            </div>
                            <span class="text-xs font-semibold text-zinc-400 bg-zinc-800/50 px-3 py-1 rounded border border-white/5">${item.location}</span>
                        </div>
                        <div class="flex gap-6 text-xs text-zinc-500 border-t border-white/5 pt-4">
                            <span>${item.beds} Bedrooms</span>
                            <span>${item.baths} Bathrooms</span>
                            <span>${item.area} m²</span>
                        </div>
                        <div class="mt-6 flex justify-between items-center">
                            <span class="text-lg font-medium text-white">ZAR ${item.pricePerDay.toLocaleString()}<span class="text-xs text-zinc-500"> / day</span></span>
                            <span class="text-xs tracking-wider text-purple-400 uppercase group-hover:translate-x-1 transition-transform">See Details &rarr;</span>
                        </div>
                    </div>
                </a>
            `).join('');

            container.innerHTML = `
                <div class="mb-12 border-b border-white/5 pb-8">
                    <h2 class="serif-heading text-4xl font-medium text-white mb-2">Our Guesthouse Rooms</h2>
                    <p class="text-zinc-400 text-sm">Select a room layout to view details and book a stay by the day.</p>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">${elements}</div>
            `;
        });
    </script>
</body>

</html>
